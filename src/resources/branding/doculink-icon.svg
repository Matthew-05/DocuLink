     stroke-width="20"
     style="color:#ffffff;font-weight:400;font-size:16px;font-family:'Anthropic Sans', '-apple-system', BlinkMacSystemFont, 'Segoe UI', sans-serif;dominant-baseline:auto;text-anchor:start;opacity:1;fill:none;stroke:#5ea050;stroke-width:20px;stroke-linecap:butt;stroke-linejoin:miter"
     id="rect4" />
  <!-- Layer 2: Blue frame, masked at the exact crossover point -->
