         y="0"
         width="680"
         height="380"
         fill="#ffffff"
         id="rect1" />
      <!-- Erase blue exactly where green's left edge stroke (x=296..316) crosses blue's bottom edge (y=224..244) -->
      <rect
         x="296"
         y="224"
         width="20"
         height="20"
         fill="#000000"
         id="rect2" />
    </mask>
    <clipPath
       id="clip-green-front">
      <rect
         x="296"
         y="224"
         width="20"
         height="20"
         id="rect3" />
    </clipPath>
  </defs>
  <!-- Layer 1: Full green frame -->
